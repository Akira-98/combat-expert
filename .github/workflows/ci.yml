name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify SDK alias guard
        run: npm run guard:alias

      - name: Typecheck and build
        run: npm run build

      - name: Install Playwright Chromium
        run: npm exec --yes --package=playwright@1.51.1 -- playwright install --with-deps chromium

      - name: Smoke check ChainProvider hook order regressions
        run: npm run smoke:chain-hooks
